name: holistia
description: "Holistia — Registra y celebra tus retos de bienestar."
publish_to: 'none'
version: 1.0.1+3

environment:
  sdk: ^3.11.0

dependencies:
  app_links: ^6.4.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  http: ^1.2.2
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  screenshot: ^3.0.0
  share_plus: ^10.1.4
  flutter:
    sdk: flutter
  oklch: ^0.0.3
  supabase_flutter: ^2.8.0
  go_router: ^14.6.0
  shared_preferences: ^2.3.3
  flutter_svg: ^2.0.16
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  url_launcher: ^6.3.1
  fl_chart: ^0.69.0
  sign_in_with_apple: ^6.1.3
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  image_path: assets/images/icon/app_icon.png
  android: true
  ios: true
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/logos/holistia/logo_holistia.svg
    - assets/images/logos/holistia/logo_holistia_light.svg
    - assets/images/logos/holistia/logo_holistia_dark.svg
    - assets/images/logos/google/logo_google.svg
